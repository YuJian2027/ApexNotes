# workspace-study-tracker.yaml
# OpenClaw 飞书接入示例配置
# 上岸笔记本身是通用 agent skill；这个文件只用于 OpenClaw 兼容接入。
# OpenClaw 用户可以把这个文件放到 ~/.openclaw/workspaces/ 下启用。

name: "备考助手"
description: "帮助追踪每日行测/申论套题进度"

# 接入的聊天渠道
# 飞书目前需要通过飞书机器人 Webhook 桥接，
# OpenClaw 飞书桥接详见 https://docs.openclaw.ai/channels/feishu
channels:
  feishu:
    enabled: true
    webhook_url: "${FEISHU_WEBHOOK_URL}"   # 在 .env 里配置
    # 只响应特定用户（填飞书 user_id，留空则全响应）
    allow_from: []

  # 其他渠道按需开启，逻辑完全一样
  # telegram:
  #   enabled: false
  #   bot_token: "${TELEGRAM_BOT_TOKEN}"
  # whatsapp:
  #   enabled: false

# 大模型配置
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  api_key: "${ANTHROPIC_API_KEY}"
  max_tokens: 1000
  temperature: 0.5

# 启用的 Skills
skills:
  - ApexNotes

# 定时任务
cron_jobs:
  - name: "备考晚间总结"
    schedule: "0 21 * * *"   # 每天 21:00
    action:
      type: run_script
      script: skills/ApexNotes/scripts/daily_summary.js
      channel: feishu           # 推送到飞书

  - name: "遗忘曲线复习提醒"
    schedule: "0 20 * * *"   # 每天 20:00（按艾宾浩斯曲线推送到期题）
    action:
      type: run_script
      script: skills/ApexNotes/scripts/review_reminder.js
      channel: feishu           # 推送到飞书

# 记忆配置（让 agent 记住用户习惯）
memory:
  enabled: true
  persist_to: "~/.apexnotes/memory.md"

settings:
  language: "zh-CN"
  reply_max_chars: 200    # 回复字数限制，避免啰嗦
